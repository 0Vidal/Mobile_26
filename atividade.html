<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sorteio de Nomes</title>
</head>
<body>

    <h2>Adicione os Nomes para Serem Sorteados</h2>

    <div class="container">
        <input type="text" id="nome" placeholder="Digite um nome: ">
        <button onclick="adicionar()">Cadastrar</button>
        <button onclick="mostrar()">Mostrar Lista</button>
        <button onclick="sortear()">Sortear Nome</button>
    </div>
    
    <p id="resultado"></p>

    <script>
        let nomes = [];

        function adicionar(){
            let nome = document.getElementById("nome").value;
            if(nome != ""){
                nomes.push(nome);
                document.getElementById("nome").value ="";
            }
        }

        function mostrar(){
            let texto = "Nomes cadastrados:<br>";
            for(let i = 0; i < nomes.length; i++){
                texto += nomes[i] + "<br>";
            }
            document.getElementById("resultado").innerHTML = texto;
        }

        function sortear(){
            if(nomes.length === 0){
                document.getElementById("resultado").innerHTML = "Nenhum nome cadastrado!";
                return;
            }

            let indice = Math.floor(Math.random() * nomes.length);
            let sorteado = nomes[indice];

            document.getElementById("resultado").innerHTML = 
                "Nome sorteado: <strong>" + sorteado + "</strong>";
        }
    </script>

</body>
</html>
