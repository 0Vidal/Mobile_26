<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presença</title>
</head>
<body>

    <h2>Lista de Presença</h2>

    <input type="text" id="nome" placeholder="Digite um nome: ">
    <button onclick="adicionar()">Cadastrar</button>
    <button onclick="mostrar()">Mostrar Lista</button>
    <button onclick="buscar()">Buscar Nome</button>

    <p id="resultado"></p>

    <script>
        let nomes = [];

        function adicionar(){
            let nome = document.getElementById("nome").value;
            if(nome != ""){
                nomes.push(nome);
                document.getElementById("nome").value ="";
            }
        }

        function mostrar(){
            let texto = "Total de nomes: " + nomes.length + "<br><br>";
            texto += "Lista:<br>";

            for(let i = 0; i < nomes.length; i++){
                texto += nomes[i] + "<br>";
            }

            document.getElementById("resultado").innerHTML = texto;
        }

        function buscar(){
            let nomeBusca = document.getElementById("nome").value;
            let encontrado = false;

            for(let i = 0; i < nomes.length; i++){
                if(nomes[i].toLowerCase() === nomeBusca.toLowerCase()){
                    encontrado = true;
                }
            }

            if(nomeBusca == ""){
                document.getElementById("resultado").innerHTML = "Digite um nome para buscar!";
            } else if(encontrado){
                document.getElementById("resultado").innerHTML = "Nome encontrado!";
            } else {
                document.getElementById("resultado").innerHTML = "Nome não encontrado!";
            }
        }
    </script>

</body>
</html>
